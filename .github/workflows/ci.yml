name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - name: Package smoke install
        run: |
          npm pack
          npm install -g ./devkit-*.tgz
          devkit --version
          devkit --help > /dev/null
          test "$(devkit calc '2+3*4')" = "14"
          test "$(devkit convert 100 c f)" = "212"
          echo "hello hello world" | devkit stats - --json
          if devkit calc '1/0'; then echo "expected failure" && exit 1; fi

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
